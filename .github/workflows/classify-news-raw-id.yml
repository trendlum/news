name: Classify News Raw By Id

on:
  workflow_dispatch:
    inputs:
      news_raw_id:
        description: 'news_raw id to classify'
        required: true
        type: string

concurrency:
  group: classify-news-raw-id-${{ github.ref }}-${{ inputs.news_raw_id }}
  cancel-in-progress: true

jobs:
  classify-id:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Public safety check
        run: npm run check:public

      - name: Classify single record
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node --import tsx scripts/classify-news-raw.ts "${{ inputs.news_raw_id }}"
