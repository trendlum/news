name: Fetch All News

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      ingest_news_raw:
        description: 'Persist fetched news into news_raw'
        required: true
        default: true
        type: boolean
      persist_taxonomy:
        description: 'Persist taxonomy after fetch'
        required: true
        default: true
        type: boolean

concurrency:
  group: fetch-all-news-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fetch-all:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Public safety check
        run: npm run check:public

      - name: Fetch all categories
        env:
          INGEST_NEWS_RAW: ${{ github.event_name == 'schedule' && 'true' || inputs.ingest_news_raw }}
          PERSIST_TAXONOMY: ${{ github.event_name == 'schedule' && 'false' || inputs.persist_taxonomy }}
          FAIL_ON_EMPTY_RESULTS: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          MIN_FETCHED_ITEMS: ${{ github.event_name == 'schedule' && '1' || '0' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node --import tsx scripts/run.ts

  classify-scheduled:
    if: github.event_name == 'schedule'
    needs: fetch-all
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Public safety check
        run: npm run check:public

      - name: Classify pending batch
        env:
          NEWS_RAW_MODE: pending
          NEWS_RAW_LIMIT: 200
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node --import tsx scripts/classify-news-raw.ts
